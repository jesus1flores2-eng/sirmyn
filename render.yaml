services:
  - type: web
    name: sirmyn
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python -c "from app import create_app; app = create_app(); app.app_context().push(); from app.extensions import db; db.create_all()"
      python cargar_datos_municipio.py
    startCommand: gunicorn run:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: reportes
          property: connectionString
      - key: FLASK_SECRET_KEY
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_ADMIN_ID
        sync: false
      - key: SERVER_URL
        sync: false
      - key: UPLOAD_FOLDER
        value: uploads
      - key: STATIC_FOLDER
        value: app/static
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: reportes
    plan: free
