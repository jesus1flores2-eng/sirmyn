services:
  - type: web
    name: sirmyn
    env: python
    buildCommand: |
      echo "============================================="
      echo "🚀 INICIANDO BUILD DE SIRMYN"
      echo "============================================="
      echo "📂 Directorio actual: $(pwd)"
      echo "📂 Archivos: $(ls -la)"
      echo "============================================="
      pip install -r requirements.txt
      echo "✅ Dependencias instaladas"
      echo "============================================="
      echo "🔄 Creando tablas en la base de datos..."
      python -c "from app import create_app; app = create_app(); app.app_context().push(); from app.extensions import db; db.create_all()"
      echo "✅ Tablas creadas correctamente"
      echo "============================================="
      echo "📥 Cargando datos iniciales (si es necesario)..."
      python -c "from app import create_app; app = create_app(); app.app_context().push(); import cargar_datos_municipio; cargar_datos_municipio.cargar_datos()"
      echo "✅ Carga de datos completada"
      echo "============================================="
    startCommand: gunicorn run:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: reportes
          property: connectionString
      - key: FLASK_SECRET_KEY
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_ADMIN_ID
        sync: false
      - key: SERVER_URL
        sync: false
      - key: UPLOAD_FOLDER
        value: uploads
      - key: STATIC_FOLDER
        value: app/static
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: reportes
    plan: free
